<!-- TOOLBAR — 2nd level page variant -->
<nx-toolbar>
  <ol nxBreadcrumb>
    @for (crumb of breadcrumbs; track crumb.label) {
      <li>
        <a nxBreadcrumbItem>{{ crumb.label }}</a>
      </li>
    }
  </ol>
  <span class="toolbar-spacer"></span>
  <button class="header-icon-btn header-icon-btn--tertiary" title="Side Panel">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
